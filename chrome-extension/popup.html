<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 280px;
      background: #161b27;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 14px 10px;
      border-bottom: 1px solid #21262d;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #484f58;
      flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.2s;
    }
    .dot.connected {
      background: #3fb950;
      box-shadow: 0 0 6px rgba(63,185,80,0.5);
    }
    .dot.error {
      background: #f85149;
    }
    .header-title {
      font-size: 13px;
      font-weight: 700;
      color: #e6edf3;
    }
    .conn-label {
      font-size: 11px;
      color: #8b949e;
      margin-left: auto;
    }

    /* ── Rows ── */
    .section {
      padding: 10px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 10px;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
    }
    .row-label {
      font-size: 12px;
      color: #8b949e;
    }
    .row-value {
      font-size: 12px;
      color: #e6edf3;
      max-width: 140px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-align: right;
    }

    /* ── Badges ── */
    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
    }
    .badge-purple { background: rgba(124,58,237,0.2); color: #a78bfa; }
    .badge-gray   { background: #21262d; color: #484f58; }
    .badge-green  { background: rgba(63,185,80,0.15); color: #3fb950; }

    /* ── Current tab section ── */
    .tab-row {
      padding: 8px 10px;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
    }
    .tab-label {
      font-size: 10px;
      color: #484f58;
      margin-bottom: 2px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .tab-domain {
      font-size: 12px;
      color: #e6edf3;
      font-family: 'SF Mono', 'Cascadia Code', monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Footer ── */
    .footer {
      padding: 8px 14px;
      border-top: 1px solid #21262d;
      font-size: 10px;
      color: #484f58;
      text-align: center;
    }

    /* ── Skeleton loading ── */
    .skeleton {
      background: #21262d;
      border-radius: 4px;
      height: 12px;
      width: 40px;
      display: inline-block;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50%       { opacity: 1; }
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="dot" id="connDot"></div>
    <span class="header-title">Flow Ledger</span>
    <span class="conn-label" id="connLabel">Connecting…</span>
  </div>

  <div class="section">
    <div class="row">
      <span class="row-label">Focus Mode</span>
      <span class="badge badge-gray" id="focusBadge"><span class="skeleton"></span></span>
    </div>
    <div class="row">
      <span class="row-label">Blocked Sites</span>
      <span class="badge badge-gray" id="blockedBadge"><span class="skeleton"></span></span>
    </div>
    <div class="row">
      <span class="row-label">Tracking</span>
      <span class="badge badge-green">Active</span>
    </div>

    <div class="tab-row" id="tabRow" style="display:none">
      <div class="tab-label">Current tab</div>
      <div class="tab-domain" id="tabDomain">—</div>
    </div>
  </div>

  <div class="footer">Flow Ledger Desktop must be running</div>

  <script>
    let settled = false;

    // Guaranteed fallback: if nothing resolves in 3 s, show "Not running"
    const giveUpTimer = setTimeout(() => {
      if (!settled) markNotRunning();
    }, 3000);

    function markConnected(data) {
      if (settled) return;
      settled = true;
      clearTimeout(giveUpTimer);
      document.getElementById('connDot').classList.add('connected');
      document.getElementById('connLabel').textContent = 'Connected';
      applyState(data);
    }

    function markNotRunning() {
      settled = true;
      clearTimeout(giveUpTimer);
      document.getElementById('connDot').classList.add('error');
      document.getElementById('connLabel').textContent = 'Not running';
      setFallback();
    }

    // ── 1. Try cached state from background service worker (instant) ────
    chrome.runtime.sendMessage({ type: 'getStatus' }, (cached) => {
      if (chrome.runtime.lastError || !cached) return;
      // Show data values immediately while fetch is still in flight
      applyState({
        focusMode:    cached.focusModeActive,
        blockedSites: cached.blockedPatterns,
        currentTab:   cached.currentTab,
      });
    });

    // ── 2. Fetch fresh status from the desktop app ───────────────────────
    // Use manual AbortController + setTimeout — AbortSignal.timeout() can
    // silently fail in some Chrome extension popup contexts.
    const ctrl = new AbortController();
    const fetchTimeout = setTimeout(() => ctrl.abort(), 2500);

    fetch('http://localhost:27314/status', { signal: ctrl.signal })
      .then(r => {
        clearTimeout(fetchTimeout);
        if (!r.ok) throw new Error('bad status');
        return r.json();
      })
      .then(data => markConnected(data))
      .catch(() => markNotRunning());

    // ── Helpers ──────────────────────────────────────────────────────────
    function applyState(data) {
      if (!data) return;
      const focusOn = data.focusMode ?? data.focusModeActive ?? false;
      const count   = (data.blockedSites ?? data.blockedPatterns ?? []).length;

      const focusBadge   = document.getElementById('focusBadge');
      const blockedBadge = document.getElementById('blockedBadge');

      focusBadge.textContent = focusOn ? 'ON' : 'OFF';
      focusBadge.className   = 'badge ' + (focusOn ? 'badge-purple' : 'badge-gray');

      blockedBadge.textContent = String(count);
      blockedBadge.className   = 'badge ' + (count > 0 ? 'badge-purple' : 'badge-gray');

      const tab = data.currentTab;
      if (tab && tab.url) {
        try {
          const host = new URL(tab.url).hostname.replace(/^www\./, '');
          document.getElementById('tabDomain').textContent = host;
          document.getElementById('tabRow').style.display = 'block';
        } catch { /* invalid URL */ }
      }
    }

    function setFallback() {
      document.getElementById('focusBadge').textContent   = '—';
      document.getElementById('focusBadge').className     = 'badge badge-gray';
      document.getElementById('blockedBadge').textContent = '—';
      document.getElementById('blockedBadge').className   = 'badge badge-gray';
    }
  </script>
</body>
</html>
