<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blocked — Flow Ledger Focus Mode</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Radial glow behind card */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 40%, rgba(124,58,237,0.12) 0%, transparent 70%);
      pointer-events: none;
    }

    .card {
      background: #161b27;
      border: 1px solid #30363d;
      border-radius: 20px;
      padding: 48px 56px;
      max-width: 480px;
      width: 90%;
      text-align: center;
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
      animation: fadeUp 0.25s ease forwards;
      position: relative;
      z-index: 1;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 72px;
      height: 72px;
      background: rgba(124,58,237,0.15);
      border: 1px solid rgba(124,58,237,0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
      animation: pulse 2.4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0   rgba(124,58,237,0.3); }
      50%       { box-shadow: 0 0 0 10px rgba(124,58,237,0); }
    }

    h1 {
      font-size: 22px;
      font-weight: 700;
      color: #e6edf3;
      margin-bottom: 8px;
    }

    .blocked-host {
      display: inline-block;
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 20px;
      font-family: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
      background: #0d1117;
      border: 1px solid #21262d;
      border-radius: 8px;
      padding: 6px 14px;
      word-break: break-all;
    }

    p {
      font-size: 14px;
      color: #8b949e;
      line-height: 1.65;
      margin-bottom: 32px;
    }

    p strong { color: #a78bfa; }

    .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .btn-primary {
      background: #7c3aed;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 11px 22px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, transform 0.15s;
    }
    .btn-primary:hover { background: #6d28d9; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      background: transparent;
      color: #8b949e;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 11px 22px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .btn-ghost:hover { background: #1c2333; color: #e6edf3; }

    /* Session timer */
    .timer {
      font-size: 12px;
      color: #484f58;
    }
    .timer-value {
      color: #7c3aed;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
    }

    .progress-bar {
      width: 100%;
      height: 2px;
      background: #21262d;
      border-radius: 2px;
      margin-top: 10px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #7c3aed, #2f81f7);
      border-radius: 2px;
      width: 0%;
      transition: width 1s linear;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">🚫</div>
    <h1>Focus Mode Active</h1>
    <span class="blocked-host" id="blockedHost">this site</span>
    <p>
      You blocked this site to protect your focus.<br/>
      <strong>Stay on track</strong> — your future self will thank you.
    </p>
    <div class="actions">
      <button class="btn-primary" onclick="goBack()">← Go Back</button>
      <button class="btn-ghost"  onclick="openNewTab()">New Tab</button>
    </div>
    <div class="timer">
      Focus session running for <span class="timer-value" id="elapsed">0s</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <script>
    // ── Show blocked hostname ────────────────────────────────────────────
    const params  = new URLSearchParams(location.search);
    const origUrl = params.get('url') || '';
    try {
      const u    = new URL(origUrl);
      const host = u.hostname.replace(/^www\./, '');
      document.getElementById('blockedHost').textContent = host;
    } catch {
      document.getElementById('blockedHost').textContent = origUrl || 'this site';
    }

    // ── Elapsed timer ────────────────────────────────────────────────────
    // Persist session start across page reloads / redirects using sessionStorage.
    // The first time this page loads we stamp a start time; subsequent loads
    // (same browser session) keep counting from the original start.
    const SESSION_KEY = 'fl_focus_start';
    if (!sessionStorage.getItem(SESSION_KEY)) {
      sessionStorage.setItem(SESSION_KEY, String(Date.now()));
    }
    const focusStart = parseInt(sessionStorage.getItem(SESSION_KEY), 10);
    const CYCLE_SECS = 52 * 60; // progress bar cycles every 52 min (Pomodoro-style)

    function formatElapsed(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      if (h > 0) return `${h}h ${m}m`;
      if (m > 0) return `${m}m ${s}s`;
      return `${s}s`;
    }

    function tick() {
      const secs = Math.floor((Date.now() - focusStart) / 1000);
      document.getElementById('elapsed').textContent    = formatElapsed(secs);
      document.getElementById('progressFill').style.width = ((secs % CYCLE_SECS) / CYCLE_SECS * 100) + '%';
    }
    tick();
    setInterval(tick, 1000);

    // ── Navigation helpers ───────────────────────────────────────────────
    function goBack() {
      // history.back() won't work if this page is the very first in history
      // (e.g. user typed the URL directly). Fall back to opening a new tab.
      if (history.length > 1) {
        history.back();
      } else {
        openNewTab();
      }
    }

    function openNewTab() {
      // chrome.tabs.create is not available from a regular page context,
      // so we open a blank tab via window.open which works from any page.
      window.open('about:blank', '_self');
    }
  </script>
</body>
</html>
